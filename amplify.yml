version: 1
applications:
  - appRoot: apps/public
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - corepack enable
            - corepack prepare pnpm@9.15.4 --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm turbo build --filter=@car1983/public
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/public/node_modules/**/*
          - apps/public/.next/cache/**/*
          - packages/ui/node_modules/**/*
          - packages/types/node_modules/**/*
          - packages/utils/node_modules/**/*

  - appRoot: apps/admin
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - corepack enable
            - corepack prepare pnpm@9.15.4 --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm turbo build --filter=@car1983/admin
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/admin/node_modules/**/*
          - apps/admin/.next/cache/**/*
          - packages/ui/node_modules/**/*
          - packages/types/node_modules/**/*
          - packages/utils/node_modules/**/*
